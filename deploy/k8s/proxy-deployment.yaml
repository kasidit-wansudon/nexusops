apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusops-proxy
  namespace: nexusops
  labels:
    app.kubernetes.io/name: nexusops
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: nexusctl
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusops
      app.kubernetes.io/component: proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusops
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nexusops-proxy
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: proxy
          image: nexusops/proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nexusops-config
          env:
            - name: TLS_CERT_PATH
              value: /etc/nexusops/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /etc/nexusops/tls/tls.key
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/nexusops/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tls-certs
          secret:
            secretName: nexusops-tls
            optional: true
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexusops-proxy
  namespace: nexusops
  labels:
    app.kubernetes.io/name: nexusops
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: nexusctl
spec:
  type: LoadBalancer
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusops
      app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
    - name: admin
      port: 8082
      targetPort: admin
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexusops-proxy
  namespace: nexusops
  labels:
    app.kubernetes.io/name: nexusops
    app.kubernetes.io/component: proxy
