apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusops-config
  namespace: nexusops
  labels:
    app.kubernetes.io/name: nexusops
    app.kubernetes.io/managed-by: nexusctl
data:
  # Application
  APP_ENV: production
  APP_NAME: nexusops
  LOG_LEVEL: info
  LOG_FORMAT: json

  # API Server
  API_HOST: "0.0.0.0"
  API_PORT: "8080"
  API_BASE_URL: https://api.nexusops.example.com

  # Runner
  RUNNER_HOST: "0.0.0.0"
  RUNNER_PORT: "8081"
  RUNNER_CONCURRENCY: "10"
  RUNNER_WORKSPACE_DIR: /workspace

  # Proxy
  PROXY_HOST: "0.0.0.0"
  PROXY_HTTP_PORT: "80"
  PROXY_HTTPS_PORT: "443"
  PROXY_ADMIN_PORT: "8082"

  # Database
  POSTGRES_DB: nexusops
  POSTGRES_HOST: nexusops-postgres.nexusops.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: require
  POSTGRES_MAX_OPEN_CONNS: "25"
  POSTGRES_MAX_IDLE_CONNS: "5"
  POSTGRES_CONN_MAX_LIFETIME: 5m

  # Redis
  REDIS_HOST: nexusops-redis.nexusops.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Frontend
  FRONTEND_PORT: "3000"
  NEXT_PUBLIC_API_URL: https://api.nexusops.example.com

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring.svc.cluster.local:4317
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
