apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusops-ingress
  namespace: nexusops
  labels:
    app.kubernetes.io/name: nexusops
    app.kubernetes.io/managed-by: nexusctl
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    nginx.ingress.kubernetes.io/rate-limit-rps: "50"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexusops.example.com
        - api.nexusops.example.com
      secretName: nexusops-tls
  rules:
    - host: nexusops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexusops-frontend
                port:
                  number: 3000
    - host: api.nexusops.example.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: nexusops-api
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nexusops-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: nexusops-api
                port:
                  number: 8080
